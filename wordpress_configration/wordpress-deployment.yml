apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: wordpress-deployment
  name: wordpress-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wordpress-deployment
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: wordpress-deployment
    spec:
      containers:
      - image: wordpress:php7.1-apache
        name: wordpress
        ports:
        - containerPort: 80
        env:
        - name: WORDPRESS_DB_HOST
          value: mysql-deployment
        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: password
        - name: WORDPRESS_DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: username
        - name: WORDPRESS_DB_NAME
          value: mysql_database 
      
        volumeMounts:
        - name: wordpress-vol
          mountPath: /var/www/html
      volumes:
      - name: wordpress-vol
        persistentVolumeClaim:
          claimName: efs-pvc

