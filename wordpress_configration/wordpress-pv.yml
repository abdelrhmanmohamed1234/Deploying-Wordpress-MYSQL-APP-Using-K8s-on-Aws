apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-pv
spec:
  storageClassName: efs-sc
  capacity:
    storage: 5Gi  
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany   
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-06c1780fbfa7e66ce
